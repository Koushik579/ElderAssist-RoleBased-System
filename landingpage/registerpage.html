<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ElderAssist-register</title>
    <link rel="stylesheet" href="./css/regstyle.css">
</head>
<body>
    <div class="regpanel">
        <div class="container">
            <h2>Register</h2>

            <form id="registerForm">

            <div class="input-box">
                <label>First Name</label>
                <input type="text" id="fname" name="fname" required>
            </div>

            <div class="input-box">
                <label>Last Name</label>
                <input type="text" id="lname" name="lname" required>
            </div>

            <div class="input-box">
                <label>Gender</label>
                <select id="gender" name="gender" required>
                <option value="select">-- Select --</option>   
                <option value="Male">Male</option>
                <option value="Female">Female</option>
                </select>
            </div>

            <div class="input-box">
                <label>Email</label>
                <input type="email" id="email" name="email" required>
            </div>

            <div class="input-box">
                <label>Password</label>
                <input type="password" id="password" name="password" required>
            </div>

            <div class="input-box">
                <label>Confirm Password</label>
                <input type="password" id="confirmPassword" required>
            </div>

            <div class="input-box">
                <label>Phone Number</label>
                <input type="tel" id="phn" name="phn">
            </div>

            <div class="input-box">
                <label>Register As</label>
                <select id="role" name="role" required>
                <option value="USER">User</option>
                <option value="CAREGIVER">Caregiver</option>
                </select>
            </div>

            <button type="submit" id="reg_btn">Register</button>

            </form>

            <div class="message" id="message"></div>
            <div class="loginredirect">
                <a href="./loginpage.html" class="logintext">
                    Already have an account?
                </a>
            </div>
        </div>
    </div>
    <script src="./js/regscript.js"></script>
</body>
</html>
