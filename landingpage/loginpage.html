<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ElderAssist - Login</title>
    <link rel="stylesheet" href="./css/loginstyle.css">
</head>
<body>

<div class="loginpanel">
    <div class="logincard">

        <h2>Login</h2>

        <form class="loginform">

            <div class="input-group">
                <input type="email" id="email" placeholder="Email ID" required>
            </div>

            <div class="input-group password-group">
                <input type="password" id="pass" placeholder="Password" required>

                <button type="button" class="toggle-password" id="togglePassword">
                    <!-- Eye Open -->
                    <svg class="eye-open" xmlns="http://www.w3.org/2000/svg" viewBox="0 -960 960 960">
                        <path d="M480-320q75 0 127.5-52.5T660-500t-52.5-127.5T480-680t-127.5 52.5T300-500t52.5 127.5T480-320Zm0-72q-45 0-76.5-31.5T372-500t31.5-76.5T480-608t76.5 31.5T588-500t-31.5 76.5T480-392Zm0 192q-146 0-266-81.5T40-500q54-137 174-218.5T480-800t266 81.5T920-500q-54 137-174 218.5T480-200Z"/>
                    </svg>

                    <!-- Eye Closed -->
                    <svg class="eye-closed" xmlns="http://www.w3.org/2000/svg" viewBox="0 -960 960 960">
                        <path d="m644-428-58-58q9-47-27-88t-93-32l-58-58q17-8 34.5-12t37.5-4q75 0 127.5 52.5T660-500q0 20-4 37.5T644-428Zm128 126-58-56q38-29 67.5-63.5T832-500q-50-101-143.5-160.5T480-720q-29 0-57 4t-55 12l-62-62q41-17 84-25.5t90-8.5q151 0 269 83.5T920-500q-23 59-60.5 109.5T772-302Zm20 246L624-222q-35 11-70.5 16.5T480-200q-151 0-269-83.5T40-500q21-53 53-98.5t73-81.5L56-792l56-56 736 736-56 56Z"/>
                    </svg>
                </button>
            </div>

            <a href="#" class="forgot">Forgot Password?</a>

            <button type="submit" class="login-btn">Login</button>

            <a href="./registerpage.html" class="register-text">
                Don't have an account?
            </a>

        </form>

    </div>
</div>
<script src="./js/loginscript.js"></script>
</body>
</html>
